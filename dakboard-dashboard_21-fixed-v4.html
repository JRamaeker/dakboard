<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dakboard</title>
<script src="https://cdn.jsdelivr.net/npm/ical.js/build/ical.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,300&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  background: #080810;
  color: #eeeeff;
  font-family: "DM Sans", sans-serif;
}

:root {
  --bg:      #080810;
  --surface: #10101c;
  --surface2:#181828;
  --border:  #232338;
  --nd-gold: #C99700;
  --nd-navy: #0C2340;
  --cs-silver:#869397;
  --green:   #00e676;
  --red:     #ff1744;
  --cyan:    #00e5ff;
  --yellow:  #ffea00;
  --cream:   #f5f0e8;
  --muted:   #6666aa;
  --text:    #eeeeff;
  --fd: "Bebas Neue", sans-serif;
  --fb: "DM Sans", sans-serif;
  --fm: "Space Mono", monospace;
}

/* ── LAYOUT: fixed vh rows ── */
.dashboard {
  width: 100vw;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Row heights add up to 100vh */
.top-strip    { height: 11vh; flex-shrink:0; display:flex; }
.cal-section  { height: 50vh; flex-shrink:0; background:var(--surface); border-bottom:3px solid var(--nd-gold); display:flex; flex-direction:column; padding:1vh 2vw; box-sizing:border-box; overflow:hidden; }
.agenda-strip { height: 22vh; flex-shrink:0; background:var(--surface2); border-bottom:2px solid var(--border); display:flex; overflow:hidden; }
.sports-section { height: 9vh; flex-shrink:0; padding:0.5vh 2vw; border-bottom:2px solid var(--border); display:flex; flex-direction:column; justify-content:center; }
.quote-section  { height: 4vh; flex-shrink:0; background:var(--nd-navy); border-top:1px solid rgba(201,151,0,0.2); display:flex; align-items:center; padding:0 2vw; gap:0.8vw; }
.status-bar     { height: 4vh; flex-shrink:0; background:var(--nd-navy); border-top:3px solid var(--nd-gold); display:flex; justify-content:space-between; align-items:center; padding:0 2vw; }

/* ── TOP STRIP ── */
.time-pill {
  background: linear-gradient(135deg,#0C2340,#162e52);
  padding: 0 2vw;
  display:flex; flex-direction:column; justify-content:center;
  flex-shrink:0;
  border-right: 3px solid var(--nd-gold);
  min-width: 22vw;
}
.date-row { display:flex; align-items:baseline; gap:1vw; }
.date-dayname { font-family:var(--fd); font-size:3.2vh; letter-spacing:3px; color:var(--nd-gold); line-height:1; }
.date-full    { font-size:1.6vh; color:rgba(255,255,255,0.5); letter-spacing:1px; text-transform:uppercase; }
.clock-row { display:flex; align-items:baseline; gap:0.3vw; line-height:1; }
.clock-hhmm { font-family:var(--fd); font-size:6vh; color:#fff; letter-spacing:1px; }
.clock-ampm { font-family:var(--fd); font-size:2.5vh; color:var(--nd-gold); letter-spacing:2px; }

.weather-strip {
  flex:1; background:var(--surface);
  padding: 0 1.5vw;
  display:flex; align-items:center; justify-content:space-between;
  gap:1vw;
  overflow:hidden;
}
/* wx-left and wx-stats are allowed to shrink (and truncate with ellipsis)
   so wx-forecast — the part that was getting clipped off-screen — always
   has room to show all of its days. */
.wx-left { display:flex; align-items:center; gap:0.7vw; flex-shrink:1; min-width:0; overflow:hidden; }
.wx-icon { font-size:3.2vh; flex-shrink:0; }
.wx-temp { font-family:var(--fd); font-size:4.4vh; color:var(--cream); line-height:1; white-space:nowrap; }
.wx-temp sup { font-size:2vh; vertical-align:top; margin-top:0.5vh; display:inline-block; }
.wx-desc { font-size:1.3vh; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.wx-loc  { font-size:1.05vh; color:var(--muted); letter-spacing:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.wx-stats { display:flex; gap:0.9vw; align-items:center; flex-shrink:1; min-width:0; overflow:hidden; }
.wx-stat { white-space:nowrap; }
.wx-stat-label { font-size:0.85vh; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); }
.wx-stat-val   { font-family:var(--fm); font-size:1.4vh; color:var(--cream); margin-top:2px; }
.wx-forecast { display:flex; border-left:1px solid var(--border); padding-left:1vw; gap:0; flex-shrink:0; }
.wx-fc-day { display:flex; flex-direction:column; align-items:center; gap:0.3vh; padding:0 0.6vw; border-right:1px solid var(--border); }
.wx-fc-day:last-child { border-right:none; }
.wx-fc-day.today-fc .wx-fc-label { color:var(--nd-gold); font-weight:700; }
.wx-fc-label  { font-size:0.9vh; letter-spacing:1px; text-transform:uppercase; color:var(--muted); white-space:nowrap; }
.wx-fc-icon   { font-size:2vh; }
.wx-fc-hi     { font-family:var(--fm); font-size:1.3vh; color:var(--cream); white-space:nowrap; }
.wx-fc-precip { font-size:0.9vh; color:var(--cream); opacity:0.7; white-space:nowrap; }

/* ── CALENDAR ── */
.cal-header { display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:0.6vh; }
.cal-month-big { font-family:var(--fd); font-size:4.6vh; letter-spacing:3px; line-height:1; }
.cal-month-big em { color:var(--nd-gold); font-style:normal; }
.cal-week-badge { font-family:var(--fm); font-size:1.1vh; color:var(--muted); border:1px solid var(--border); padding:2px 8px; border-radius:4px; }

.cal-dow-row { display:grid; grid-template-columns:repeat(7,1fr); margin-bottom:0.3vh; width:100%; }
.cal-dow { text-align:center; font-size:1.05vh; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); padding:0.2vh 0; font-weight:500; }
.cal-dow:first-child,.cal-dow:last-child { color:var(--nd-gold); opacity:0.7; }
.cal-dow.today-col { color:var(--nd-gold) !important; opacity:1 !important; }

.cal-days-grid {
  display:grid; grid-template-columns:repeat(7,1fr);
  grid-auto-rows: 1fr;
  gap:3px;
  flex:1;
  width:100%;
  min-height:0;
}
.cal-day {
  display:flex; flex-direction:column;
  align-items:flex-start; justify-content:flex-start;
  padding:0.3vh 0.3vw;
  border-radius:6px;
  background:var(--surface2);
  overflow:hidden;
  box-sizing:border-box;
}
.cal-day.other-month { background:transparent; color:#2a2a44; }
.cal-day.today { background:rgba(201,151,0,0.15); border:1px solid var(--nd-gold); }
.cal-day.today-col-bg { background:rgba(201,151,0,0.05); }
.day-num { font-family:var(--fm); font-size:1.2vh; line-height:1; margin-bottom:0.2vh; width:100%; text-align:right; }
.cal-day.today .day-num { color:var(--nd-gold); font-weight:700; }
.cal-event-pill {
  width:100%; font-family:var(--fb); font-size:0.85vh; font-weight:600;
  line-height:1.15; padding:1px 4px; border-radius:3px; margin-bottom:1px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:#fff;
}
.cal-event-time { font-size:0.7vh; opacity:0.75; font-weight:400; display:block; margin-bottom:0px; }
.cal-more { font-size:0.7vh; color:var(--muted); padding:1px 3px; }

/* ── AGENDA STRIP ── */
.agenda-day-col { flex:1; border-right:1px solid var(--border); display:flex; flex-direction:column; min-height:0; }
.agenda-day-col:last-child { border-right:none; }
.agenda-day-header { padding:0.6vh 1vw; border-bottom:1px solid var(--border); position:relative; }
.agenda-day-header.is-today { background:linear-gradient(135deg,rgba(201,151,0,0.18),transparent); border-bottom-color:var(--nd-gold); }
.agenda-dow { font-family:var(--fd); font-size:1.5vh; letter-spacing:2.5px; color:var(--muted); line-height:1; }
.agenda-day-header.is-today .agenda-dow { color:var(--nd-gold); }
.agenda-daynum { font-family:var(--fd); font-size:2.8vh; line-height:1; color:var(--text); }
.agenda-day-header.is-today .agenda-daynum { color:var(--nd-gold); }
.agenda-count-badge { position:absolute; top:0.5vh; right:0.5vw; background:var(--nd-gold); color:#000; font-size:0.85vh; font-weight:700; width:1.7vh; height:1.7vh; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:var(--fm); z-index:2; }
.agenda-events { flex:1; padding:0.4vh 0.8vw 0.4vh; display:flex; flex-direction:column; gap:0.3vh; overflow:hidden; }
.agenda-event-chip { display:flex; gap:0.4vw; align-items:flex-start; }
.chip-bar { width:3px; border-radius:2px; flex-shrink:0; align-self:stretch; min-height:1.6vh; }
.chip-time  { font-family:var(--fm); font-size:0.95vh; color:var(--muted); margin-bottom:1px; }
.chip-title { font-size:1.1vh; font-weight:500; line-height:1.25; color:var(--text); }
.no-events  { font-size:1vh; color:var(--border); font-style:italic; }

/* ── SPORTS ── */
.sports-header { display:flex; align-items:center; gap:1vw; margin-bottom:0.5vh; }
.sports-title { font-family:var(--fd); font-size:1.8vh; letter-spacing:5px; }
.live-badge { font-size:0.9vh; letter-spacing:2px; font-weight:700; text-transform:uppercase; padding:2px 8px; border-radius:20px; background:rgba(255,23,68,0.12); color:var(--red); border:1px solid rgba(255,23,68,0.35); }
.live-dot { display:inline-block; width:6px; height:6px; border-radius:50%; background:var(--red); margin-right:4px; animation:blink 1s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.15} }

.scores-ticker { border:1px solid var(--border); border-radius:6px; display:flex; flex-direction:row; overflow-x:auto; overflow-y:hidden; scrollbar-width:none; max-width:100%; }
.scores-ticker::-webkit-scrollbar { display:none; }
.score-row { display:flex; flex-direction:column; justify-content:center; padding:0.3vh 0.8vw; gap:0.15vh; border-right:1px solid var(--border); flex-shrink:0; min-width:11vw; }
.score-row:last-child { border-right:none; }
.score-row.featured-row { background:rgba(255,255,255,0.03); border-top:2px solid transparent; }
.score-row.nd-row  { border-top-color:var(--nd-gold); }
.score-row.dfw-row { border-top-color:var(--cs-silver); }
.score-league { font-size:0.7vh; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); margin-bottom:0.1vh; line-height:1; }
.nd-league  { color:var(--nd-gold); }
.dfw-league { color:var(--cs-silver); }
.score-teams { flex:1; display:flex; flex-direction:column; gap:0.1vh; }
.score-line  { display:flex; align-items:center; justify-content:space-between; line-height:1.1; }
.s-name { font-size:1vh; font-weight:500; }
.s-pts  { font-family:var(--fm); font-size:1vh; font-weight:700; }
.s-win  .s-name { color:var(--text); }
.s-lose .s-name { color:var(--muted); }
.s-pts-w { color:var(--green); }
.s-pts-l { color:var(--muted); }
.score-status { font-size:0.7vh; text-transform:uppercase; letter-spacing:1px; line-height:1; }
.st-live  { color:var(--red); font-weight:700; }
.st-final { color:var(--muted); }
.st-sched { color:var(--cyan); }

/* ── QUOTE ── */
.quote-mark { font-family:var(--fd); font-size:3vh; line-height:0.8; color:var(--nd-gold); opacity:0.35; flex-shrink:0; }
.quote-text { font-size:1.1vh; font-weight:300; font-style:italic; line-height:1.25; color:rgba(255,255,255,0.85); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.quote-author { font-family:var(--fm); font-size:0.85vh; color:var(--nd-gold); letter-spacing:2px; text-transform:uppercase; margin-top:0.1vh; }

/* ── STATUS ── */
.status-item { display:flex; align-items:center; gap:0.5vw; font-size:1.2vh; color:rgba(255,255,255,0.65); }
.status-dot { width:8px; height:8px; border-radius:50%; background:var(--green); box-shadow:0 0 8px var(--green); animation:blink 3s ease-in-out infinite; }
.nd-mark { font-family:var(--fd); font-size:1.8vh; letter-spacing:2px; color:var(--nd-gold); }

@keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>
<div class="dashboard">

  <!-- TOP STRIP -->
  <div class="top-strip">
    <div class="time-pill">
      <div class="date-row">
        <div class="date-dayname" id="dayname">SUNDAY</div>
        <div class="date-full" id="datefull">June 7, 2026</div>
      </div>
      <div class="clock-row">
        <span class="clock-hhmm" id="hhmm">09:18</span>
        <span class="clock-ampm" id="ampm">AM</span>
      </div>
    </div>
    <div class="weather-strip">
      <div class="wx-left">
        <div class="wx-icon" id="wx-icon">⛅</div>
        <div>
          <div class="wx-temp"><span id="wx-temp">77</span><sup>°F</sup></div>
          <div class="wx-desc" id="wx-desc">Overcast</div>
          <div class="wx-loc">📍 Notre Dame, IN</div>
        </div>
      </div>
      <div class="wx-stats">
        <div class="wx-stat"><div class="wx-stat-label">High</div><div class="wx-stat-val" id="wx-hi">--°</div></div>
        <div class="wx-stat"><div class="wx-stat-label">Rain</div><div class="wx-stat-val" id="wx-rain">--%</div></div>
        <div class="wx-stat"><div class="wx-stat-label">Wind</div><div class="wx-stat-val" id="wx-wind">--mph</div></div>
        <div class="wx-stat"><div class="wx-stat-label">Humid</div><div class="wx-stat-val" id="wx-humid">--%</div></div>
      </div>
      <div class="wx-forecast" id="wx-forecast">
        <div class="wx-fc-day today-fc"><div class="wx-fc-label">Today</div><div class="wx-fc-icon">⛅</div><div class="wx-fc-hi">--°</div><div class="wx-fc-precip">💧--%</div></div>
        <div class="wx-fc-day"><div class="wx-fc-label">Mon</div><div class="wx-fc-icon">🌤️</div><div class="wx-fc-hi">--°</div><div class="wx-fc-precip">💧--%</div></div>
        <div class="wx-fc-day"><div class="wx-fc-label">Tue</div><div class="wx-fc-icon">🌤️</div><div class="wx-fc-hi">--°</div><div class="wx-fc-precip">💧--%</div></div>
      </div>
    </div>
  </div>

  <!-- CALENDAR -->
  <div class="cal-section">
    <div class="cal-header">
      <div class="cal-month-big" id="cal-heading">JUNE <em>2026</em></div>
      <div class="cal-week-badge" id="cal-week-badge">WEEK 23</div>
    </div>
    <div class="cal-dow-row">
      <div class="cal-dow">Sun</div><div class="cal-dow">Mon</div><div class="cal-dow">Tue</div>
      <div class="cal-dow">Wed</div><div class="cal-dow">Thu</div><div class="cal-dow">Fri</div>
      <div class="cal-dow">Sat</div>
    </div>
    <div class="cal-days-grid" id="cal-days"></div>
  </div>

  <!-- AGENDA STRIP -->
  <div class="agenda-strip" id="agenda-strip"></div>

  <!-- SPORTS -->
  <div class="sports-section">
    <div class="sports-header">
      <div class="sports-title">SCORES</div>
      <span class="live-badge"><span class="live-dot"></span>LIVE</span>
    </div>
    <div class="scores-ticker" id="scores-ticker"></div>
  </div>

  <!-- QUOTE -->
  <div class="quote-section">
    <div class="quote-mark">"</div>
    <div>
      <div class="quote-text"   id="quote-text">Loading...</div>
      <div class="quote-author" id="quote-author">—</div>
    </div>
  </div>

  <!-- STATUS -->
  <div class="status-bar">
    <div class="status-item"><div class="status-dot"></div> Google Calendar Synced</div>
    <div class="nd-mark">☘ GO IRISH</div>
    <div class="status-item" id="last-updated">Updated just now</div>
  </div>

</div>
<script>
// ── CLOCK ──
function updateClock() {
  const now = new Date();
  let h = now.getHours();
  const ampm = h >= 12 ? "PM" : "AM";
  h = h % 12 || 12;
  const m = String(now.getMinutes()).padStart(2,"0");
  document.getElementById("hhmm").textContent = `${String(h).padStart(2,"0")}:${m}`;
  document.getElementById("ampm").textContent = ampm;
  const DAYS = ["SUNDAY","MONDAY","TUESDAY","WEDNESDAY","THURSDAY","FRIDAY","SATURDAY"];
  document.getElementById("dayname").textContent  = DAYS[now.getDay()];
  document.getElementById("datefull").textContent = now.toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"});
}
setInterval(updateClock, 15000); // no seconds shown, so no need to tick every second
updateClock();

// ── CALENDAR ──
const MONTHS_LONG  = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const DAYS_SHORT   = ["SUN","MON","TUE","WED","THU","FRI","SAT"];

const ICAL_URLS = [
  'https://calendar.google.com/calendar/ical/d80f4844ae8c2f869f660d6e6078b0f184451702d45fbbd2f3a66692f80c1f50%40group.calendar.google.com/private-7022698de91dfb34b8f41e91958c036a/basic.ics',
  'https://calendar.google.com/calendar/ical/jramaeker%40gmail.com/private-ed1cf5264075361bc34ca0206faf1750/basic.ics',
  'https://calendar.google.com/calendar/ical/a53339bf3b5e37f4057d8f4a42b90ef80e5cad84eae80fabc97eaffc0589ad02%40group.calendar.google.com/private-c14d773eaca26a4cc83d53db421a1411/basic.ics',
  'https://calendar.google.com/calendar/ical/220e3efc2bf8ebcc0aa3969aa5d6917b7ddddabde6c1e5b01557dc9cf45253b7%40group.calendar.google.com/private-a88e92d6b25959e79272f2be95773e17/basic.ics',
  'https://calendar.google.com/calendar/ical/c9a812107a0db75640adc93b84b0529027d096a869e96f14a4bdfeee9558c6f5%40group.calendar.google.com/private-0c232096752fadad189dcc091d66eb0f/basic.ics',
  'https://calendar.google.com/calendar/ical/family11371226280449696764%40group.calendar.google.com/private-b43b14ddf86a7bd4db612128fbd3fa75/basic.ics',
];

const calEvents = [];

// Multiple CORS proxies tried in order — allorigins.win alone is frequently
// rate-limited / down, which is why iCal feeds were silently failing.
const CORS_PROXIES = [
  url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
  url => `https://corsproxy.io/?url=${encodeURIComponent(url)}`,
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  url => `https://thingproxy.freeboard.io/fetch/${url}`,
];

function processICS(text, url) {
  if (!text || text.indexOf("BEGIN:VCALENDAR") === -1) {
    throw new Error("Response is not a valid ICS file");
  }
  const jcal = ICAL.parse(text);
  const comp = new ICAL.Component(jcal);
  const vevents = comp.getAllSubcomponents("vevent");
  const colors = ["#ff3366","#C99700","#7c3aed","#00e5ff","#ffea00","#00e676"];
  const today = new Date(); today.setHours(0,0,0,0);
  const cutoff = new Date(today); cutoff.setDate(cutoff.getDate() + 60);
  vevents.forEach(ev => {
    const event = new ICAL.Event(ev);
    const start = event.startDate.toJSDate();
    const end   = event.endDate ? event.endDate.toJSDate() : start;
    const color = colors[Math.abs((event.summary||"").charCodeAt(0)) % colors.length];
    if (end < today) return;
    if (start > cutoff) return;
    const isAllDay = event.startDate.isDate;
    if (isAllDay && end > start) {
      const cur = new Date(start);
      while (cur < end) {
        if (cur >= today) calEvents.push({ date: cur.toISOString().slice(0,10), title: event.summary||"(No title)", time:"All Day", color });
        cur.setDate(cur.getDate() + 1);
      }
    } else {
      calEvents.push({ date: start.toISOString().slice(0,10), title: event.summary||"(No title)", time: isAllDay?"All Day":start.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"}), color });
    }
  });
  console.log(`Cal OK (${vevents.length} events): ${url}`);
}

async function fetchOneCalendar(url) {
  for (let i = 0; i < CORS_PROXIES.length; i++) {
    try {
      const proxied = CORS_PROXIES[i](url);
      const res  = await fetch(proxied, { cache: "no-store" });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const text = await res.text();
      processICS(text, url);
      return true; // success — stop trying other proxies
    } catch(e) {
      console.warn(`Cal proxy #${i+1} failed for ${url}:`, e.message || e);
    }
  }
  console.error("All CORS proxies failed for calendar:", url);
  return false;
}

let calendarLoadOk = true; // becomes false only if EVERY calendar feed fails

async function loadCalendar() {
  const results = await Promise.all(ICAL_URLS.map(url => fetchOneCalendar(url)));
  calEvents.sort((a,b) => a.date.localeCompare(b.date));
  calendarLoadOk = results.some(ok => ok);
  return calendarLoadOk;
}

function buildCalendar() {
  const now   = new Date();
  const year  = now.getFullYear();
  const month = now.getMonth();
  const today = now.getDate();

  document.getElementById("cal-heading").innerHTML = `${MONTHS_LONG[month].toUpperCase()} <em>${year}</em>`;
  const startOfYear = new Date(year,0,1);
  const weekNum = Math.ceil(((now-startOfYear)/86400000 + startOfYear.getDay()+1)/7);
  document.getElementById("cal-week-badge").textContent = `WEEK ${weekNum}`;

  const dowHeaders = document.querySelectorAll(".cal-dow");
  dowHeaders.forEach((el,i) => { if(i===now.getDay()) el.classList.add("today-col"); });

  const eventMap = {};
  calEvents.forEach(ev => { if(!eventMap[ev.date]) eventMap[ev.date]=[]; eventMap[ev.date].push(ev); });

  const firstDay  = new Date(year,month,1).getDay();
  const daysInMo  = new Date(year,month+1,0).getDate();
  const prevDays  = new Date(year,month,0).getDate();
  const grid = document.getElementById("cal-days");
  grid.innerHTML = "";

  const addCell = (num, cls, ds) => {
    const cell = document.createElement("div");
    cell.className = "cal-day " + cls;
    let inner = `<span class="day-num">${num}</span>`;
    if (ds && eventMap[ds]) {
      const evs = eventMap[ds];
      evs.slice(0,2).forEach(ev => {
        inner += `<div class="cal-event-pill" style="background:${ev.color}88;border-left:3px solid ${ev.color}"><span class="cal-event-time">${ev.time}</span>${ev.title}</div>`;
      });
      if (evs.length > 2) inner += `<div class="cal-more">+${evs.length-2} more</div>`;
    }
    cell.innerHTML = inner;
    grid.appendChild(cell);
  };

  for (let i=firstDay-1; i>=0; i--) addCell(prevDays-i,"other-month",null);
  for (let d=1; d<=daysInMo; d++) {
    const ds  = `${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const dow = new Date(year,month,d).getDay();
    const cls = d===today ? "today" : (dow===now.getDay() ? "today-col-bg" : "");
    addCell(d, cls, ds);
  }
  const total = firstDay+daysInMo;
  const rem   = total%7===0?0:7-(total%7);
  for (let d=1; d<=rem; d++) addCell(d,"other-month",null);
}

function buildAgenda() {
  const now   = new Date();
  const strip = document.getElementById("agenda-strip");
  strip.innerHTML = "";
  for (let i=0; i<5; i++) {
    const d  = new Date(now); d.setDate(now.getDate()+i);
    const ds = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
    const isToday = i===0;
    const dayEvents = calEvents.filter(e => e.date===ds);
    const badgeHTML = dayEvents.length ? `<div class="agenda-count-badge">${dayEvents.length}</div>` : "";
    const evHTML = !calendarLoadOk
      ? `<div class="no-events" style="color:var(--red);font-style:normal;">Couldn't load</div>`
      : dayEvents.length
        ? dayEvents.slice(0,3).map(ev=>`<div class="agenda-event-chip"><div class="chip-bar" style="background:${ev.color}"></div><div><div class="chip-time">${ev.time}</div><div class="chip-title">${ev.title}</div></div></div>`).join("")
        : `<div class="no-events">No events</div>`;
    const col = document.createElement("div");
    col.className = "agenda-day-col";
    col.innerHTML = `<div class="agenda-day-header${isToday?" is-today":""}"><div class="agenda-dow">${DAYS_SHORT[d.getDay()]}</div><div class="agenda-daynum">${d.getDate()}</div>${badgeHTML}</div><div class="agenda-events">${evHTML}</div>`;
    strip.appendChild(col);
  }
}

loadCalendar().then(() => { buildCalendar(); buildAgenda(); });

const WX_LAT = 41.7052, WX_LON = -86.2354;
const WMO_ICONS = {0:"☀️",1:"🌤️",2:"⛅",3:"☁️",45:"🌫️",48:"🌫️",51:"🌦️",53:"🌦️",55:"🌧️",61:"🌧️",63:"🌧️",65:"🌧️",71:"❄️",73:"❄️",75:"❄️",77:"❄️",80:"🌦️",81:"🌧️",82:"⛈️",85:"❄️",86:"❄️",95:"⛈️",96:"⛈️",99:"⛈️"};
const WMO_DESC  = {0:"Clear Sky",1:"Mostly Clear",2:"Partly Cloudy",3:"Overcast",45:"Foggy",48:"Foggy",51:"Light Drizzle",53:"Drizzle",55:"Heavy Drizzle",61:"Light Rain",63:"Rain",65:"Heavy Rain",71:"Light Snow",73:"Snow",75:"Heavy Snow",77:"Snow Grains",80:"Light Showers",81:"Showers",82:"Heavy Showers",85:"Snow Showers",86:"Heavy Snow",95:"Thunderstorm",96:"Thunderstorm w/ Hail",99:"Thunderstorm w/ Hail"};
const DAYS_FC   = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

function showWeatherError() {
  document.getElementById("wx-icon").textContent = "⚠️";
  document.getElementById("wx-desc").textContent = "Couldn't load weather";
  document.getElementById("wx-desc").style.color = "var(--red)";
}

async function loadWeather() {
  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${WX_LAT}&longitude=${WX_LON}&current=temperature_2m,weathercode,windspeed_10m,relative_humidity_2m&daily=temperature_2m_max,temperature_2m_min,weathercode,precipitation_probability_max&temperature_unit=fahrenheit&wind_speed_unit=mph&forecast_days=4&timezone=America%2FChicago`;
    const res  = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (!data.current || !data.daily) throw new Error("Malformed weather response");
    document.getElementById("wx-desc").style.color = "";
    const cur = data.current, day = data.daily;
    document.getElementById("wx-temp").textContent  = Math.round(cur.temperature_2m);
    document.getElementById("wx-desc").textContent  = WMO_DESC[cur.weathercode]||"Unknown";
    document.getElementById("wx-icon").textContent  = WMO_ICONS[cur.weathercode]||"🌡️";
    document.getElementById("wx-hi").textContent    = Math.round(day.temperature_2m_max[0])+"°";
    document.getElementById("wx-rain").textContent  = day.precipitation_probability_max[0]+"%";
    document.getElementById("wx-wind").textContent  = Math.round(cur.windspeed_10m)+"mph";
    document.getElementById("wx-humid").textContent = cur.relative_humidity_2m+"%";
    const fcCols = document.querySelectorAll(".wx-fc-day");
    fcCols.forEach((col,i) => {
      if (!day.temperature_2m_max[i]) return;
      const fcDate = new Date(day.time[i]+"T12:00:00");
      col.querySelector(".wx-fc-label").textContent  = i===0?"Today":DAYS_FC[fcDate.getDay()];
      col.querySelector(".wx-fc-icon").textContent   = WMO_ICONS[day.weathercode[i]]||"🌡️";
      col.querySelector(".wx-fc-hi").textContent     = Math.round(day.temperature_2m_max[i])+"°";
      col.querySelector(".wx-fc-precip").textContent = "💧"+day.precipitation_probability_max[i]+"%";
    });
  } catch(e) { console.error("Weather failed:", e); showWeatherError(); }
}

// ── SCORES ──
// Note: fetchESPN/fetchSoccer now THROW on failure (instead of swallowing
// errors and returning []) so loadScores can tell "API unreachable" apart
// from "API reachable, just no games today" and show an honest message.
async function fetchESPN(sport, league) {
  const today = new Date().toISOString().slice(0,10).replace(/-/g,"");
  const res = await fetch(`https://site.api.espn.com/apis/site/v2/sports/${sport}/${league}/scoreboard?dates=${today}`);
  if (!res.ok) throw new Error(`ESPN ${sport}/${league} HTTP ${res.status}`);
  const data = await res.json();
  return data.events || [];
}
async function fetchSoccer() {
  const today = new Date().toISOString().slice(0,10).replace(/-/g,"");
  const leagues = ["soccer/fifa-world-cup","soccer/uefa-european-championship","soccer/concacaf-gold-cup","soccer/copa-america"];
  let lastErr = null;
  for (const l of leagues) {
    try {
      const res = await fetch(`https://site.api.espn.com/apis/site/v2/sports/${l}/scoreboard?dates=${today}`);
      if (!res.ok) throw new Error(`ESPN ${l} HTTP ${res.status}`);
      const data = await res.json();
      lastErr = null; // reachable — even an empty result clears the error
      if (data.events && data.events.length > 0) return data.events.slice(0,3);
    } catch(e) { lastErr = e; }
  }
  if (lastErr) throw lastErr; // every league call errored — treat as unreachable
  return [];
}
function parseGame(event, label) {
  try {
    const comp = event.competitions[0];
    const home = comp.competitors.find(c=>c.homeAway==="home")||comp.competitors[0];
    const away = comp.competitors.find(c=>c.homeAway==="away")||comp.competitors[1];
    const status = comp.status.type;
    const hs = parseInt(home.score||0), as2 = parseInt(away.score||0);
    const isLive  = status.state==="in";
    const isFinal = status.state==="post";
    const statusStr = isLive?(comp.status.displayClock||"LIVE"):isFinal?"FINAL":(event.status?.type?.shortDetail||"TBD");
    return { league:label, t1:home.team.shortDisplayName||home.team.abbreviation, t1abbr:home.team.abbreviation, s1:hs, t2:away.team.shortDisplayName||away.team.abbreviation, t2abbr:away.team.abbreviation, s2:as2, win:isFinal?(hs>as2?1:2):0, status:statusStr, live:isLive, scheduled:status.state==="pre" };
  } catch(e) { return null; }
}
const isND  = g => g&&(g.t1abbr==="ND"||g.t2abbr==="ND"||g.t1.toLowerCase().includes("notre dame")||g.t2.toLowerCase().includes("notre dame"));
const isDAL = g => g&&(g.t1abbr==="DAL"||g.t2abbr==="DAL");

function renderScores(games) {
  const ticker = document.getElementById("scores-ticker");
  ticker.innerHTML = "";
  if (!games.length) { ticker.innerHTML='<div class="score-row"><div class="score-league" style="color:var(--muted)">No games today</div></div>'; return; }
  scoresScrollPos = 0; scoresScrollDir = 1; // restart cleanly so a shorter game list doesn't start mid-scroll off-screen
  games.forEach(g => {
    const nd  = isND(g), dal = isDAL(g);
    const rc  = nd?"score-row featured-row nd-row":dal?"score-row featured-row dfw-row":"score-row";
    const lc  = nd?"score-league nd-league":dal?"score-league dfw-league":"score-league";
    const stc = g.live?"st-live":g.status==="FINAL"?"st-final":"st-sched";
    if (g.scheduled) {
      ticker.innerHTML += `<div class="${rc}"><div class="${lc}">${g.league}</div><div class="score-teams"><div class="score-line s-win"><span class="s-name">${g.t1}</span></div><div class="score-line s-win"><span class="s-name">vs ${g.t2}</span></div></div><div class="score-status st-sched">${g.status}</div></div>`;
    } else {
      ticker.innerHTML += `<div class="${rc}"><div class="${lc}">${g.league}</div><div class="score-teams"><div class="score-line ${g.win===1?"s-win":"s-lose"}"><span class="s-name">${g.t1}</span><span class="s-pts ${g.win===1?"s-pts-w":"s-pts-l"}">${g.s1}</span></div><div class="score-line ${g.win===2?"s-win":"s-lose"}"><span class="s-name">${g.t2}</span><span class="s-pts ${g.win===2?"s-pts-w":"s-pts-l"}">${g.s2}</span></div></div><div class="score-status ${stc}">${g.status}</div></div>`;
    }
  });
  setTimeout(autoScrollScores, 500);
}

// Track the running animation so re-renders (every 5 min) don't stack up
// multiple competing scroll loops — that overlap was what caused the stutter.
let scoresScrollFrame = null;
let scoresScrollPos   = 0;
let scoresScrollDir   = 1;
const SCORES_SCROLL_SPEED = 0.022; // px per ms — slowed down so scores stay readable as they pass

function autoScrollScores() {
  if (scoresScrollFrame !== null) { cancelAnimationFrame(scoresScrollFrame); scoresScrollFrame = null; }
  const ticker = document.getElementById("scores-ticker");
  if (!ticker) return;
  const max = ticker.scrollWidth - ticker.clientWidth;
  if (max <= 0) { ticker.scrollLeft = 0; scoresScrollPos = 0; return; }
  scoresScrollPos = Math.min(scoresScrollPos, max);
  let last = null;
  function step(ts) {
    if (last === null) last = ts;
    const dt = Math.min(ts - last, 100); // clamp to avoid big jumps after tab throttling
    last = ts;
    scoresScrollPos += scoresScrollDir * SCORES_SCROLL_SPEED * dt;
    if (scoresScrollPos >= max) { scoresScrollPos = max; scoresScrollDir = -1; }
    if (scoresScrollPos <= 0)   { scoresScrollPos = 0;   scoresScrollDir = 1; }
    ticker.scrollLeft = scoresScrollPos;
    scoresScrollFrame = requestAnimationFrame(step);
  }
  scoresScrollFrame = requestAnimationFrame(step);
}

function showScoresError() {
  if (scoresScrollFrame !== null) { cancelAnimationFrame(scoresScrollFrame); scoresScrollFrame = null; }
  const ticker = document.getElementById("scores-ticker");
  ticker.innerHTML = '<div class="score-row"><div class="score-league" style="color:var(--red)">Couldn\'t load scores</div><div class="score-status st-sched">Will retry shortly</div></div>';
}

async function loadScores() {
  const SOURCES = [
    ["football","nfl","NFL"], ["football","college-football","NCAAF"],
    ["basketball","mens-college-basketball","NCAAB"], ["baseball","mlb","MLB"],
    ["basketball","nba","NBA"], ["baseball","college-baseball","NCAAB"],
  ];
  const settled = await Promise.allSettled(SOURCES.map(([sport,league]) => fetchESPN(sport,league)));
  const intlSettled = await fetchSoccer().then(
    value  => ({ status:"fulfilled", value }),
    reason => ({ status:"rejected", reason })
  );

  // Only show "couldn't load" if literally every source failed — a single
  // league hiccup shouldn't blank out the whole ticker.
  if (settled.every(r => r.status === "rejected") && intlSettled.status === "rejected") {
    console.error("Scores: all sources failed to load");
    showScoresError();
    return;
  }

  const all = [];
  settled.forEach((r, i) => {
    if (r.status === "fulfilled") {
      r.value.forEach(e => { const g = parseGame(e, SOURCES[i][2]); if (g) all.push(g); });
    } else {
      console.warn(`Scores: ${SOURCES[i][2]} failed:`, r.reason?.message || r.reason);
    }
  });
  if (intlSettled.status === "fulfilled") {
    intlSettled.value.forEach(e => { const g = parseGame(e, "INTL"); if (g) all.push(g); });
  }

  all.sort((a,b) => { if(isND(a)&&!isND(b))return -1; if(!isND(a)&&isND(b))return 1; if(isDAL(a)&&!isDAL(b))return -1; if(!isDAL(a)&&isDAL(b))return 1; if(a.live&&!b.live)return -1; if(!a.live&&b.live)return 1; return 0; });
  renderScores(all);
}
loadScores();
setInterval(loadScores, 5*60*1000);
